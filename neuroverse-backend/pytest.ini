[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --strict-markers
markers =
    auth: auth endpoint tests
    tests: test session endpoint tests
    reports: report endpoint tests
    doctor: doctor endpoint tests
    admin: admin endpoint tests
    notifications: notification tests
    feedback: feedback tests
    slow: slow tests
