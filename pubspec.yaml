name: neuroverse
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  
  # API requests
  http: ^1.2.0
  http_parser: ^4.0.0
  
  # Secure token storage (JWT tokens)
  flutter_secure_storage: ^10.0.0

  # Non-secure simple local storage (theme mode, flags, etc.)
  shared_preferences: ^2.2.2

  image_picker: ^1.1.1

  url_launcher: ^6.2.1

  share_plus: ^12.0.1

  # Text-to-Speech for story recall test
  flutter_tts: ^4.2.0

  # Audio recording for speech tests
  record: ^6.2.0
  path_provider: ^2.1.2
  permission_handler: ^12.0.1
  sensors_plus: ^7.0.0




dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/speech/
